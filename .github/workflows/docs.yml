name: docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/docs.yml
  # Ручной запуск из вкладки Actions — задеплоить доку, не дожидаясь пуша в docs/**.
  workflow_dispatch:

permissions:
  contents: write  # gh-deploy пушит собранный сайт в ветку gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs-material
      - run: mkdocs gh-deploy --force
