site_name: lite-guardrails
site_description: Быстрый self-hosted для текста — PII / NSFW / релевантность
site_url: https://maksimov-m.github.io/lite-guardrails/
docs_dir: docs

theme:
  name: material
  language: ru
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Светлая тема
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  logo: assets/feather-logo.svg
  favicon: assets/favicon.svg

nav:
  - Обзор: index.md
  - Модули: modules.md
  - Развёртывание: deployment.md
  - Python SDK: sdk.md
  - JavaScript SDK: sdk-js.md
  - Архитектура: architecture.md
  - Сравнение: comparison.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  # Иконки/эмодзи Material (:material-*:) — без этого шорткоды остаются текстом.
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: ru
