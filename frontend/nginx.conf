# Единственная публичная точка входа: раздаёт SPA и проксирует API гуарда на тот
# же origin (CORS не нужен). Бэкенд, Postgres и Redis наружу НЕ публикуются —
# ходить к ним можно только изнутри docker-сети через этот nginx.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Не светим версию nginx в заголовках/ошибках.
    server_tokens off;

    # Базовые security-заголовки для админ-UI.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Потолок тела запроса. MAX_TEXT_LENGTH ~16 КБ на текст, но batch-ручки
    # принимают массивы — 2 МБ с запасом и одновременно щит от гигантских тел.
    client_max_body_size 2m;

    # Публичный API: детекция/анонимизация (/v1), админка (/admin), статус (/health).
    # Внутренние /metrics, /live, /ready СПЕЦИАЛЬНО не проксируем — их скрейпит
    # Prometheus / дергает оркестратор изнутри сети, наружу они не выходят.
    location ~ ^/(v1|admin|health)(/|$) {
        proxy_pass http://guardrails:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # SPA: всё остальное — статика одностраничника.
    location / {
        try_files $uri /index.html;
    }
}
