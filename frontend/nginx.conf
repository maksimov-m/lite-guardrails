server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Запросы к API проксируем на бэкенд гуарда — для браузера это тот же origin,
    # поэтому CORS не задействуется. Имя "guardrails" — сервис из docker-compose.
    location ~ ^/(v1|admin|health)(/|$) {
        proxy_pass http://guardrails:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: всё остальное отдаём как статику (одностраничник).
    location / {
        try_files $uri /index.html;
    }
}
