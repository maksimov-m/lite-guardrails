# Автопровижининг дашбордов: Grafana подхватит все JSON из смонтированного каталога.
apiVersion: 1

providers:
  - name: lite-guardrails
    orgId: 1
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
