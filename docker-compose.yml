services:
  guardrails:
    build: .
    image: lite-guardrails
    ports:
      - "8000:8000"
    # Все креды/настройки — из .env (см. .env.example).
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Пусто -> UI ходит в API относительным путём через nginx-проксю (тот же
        # origin). Задайте UI_API_BASE в .env, если фронт и бэк на разных хостах.
        VITE_API_BASE: ${UI_API_BASE:-}
    image: lite-guardrails-frontend
    ports:
      - "8080:80"
    depends_on:
      - guardrails
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB берутся из .env
    env_file:
      - .env
    # публикуем на хостовый 5433 (5432 занят локальным Postgres),
    # чтобы LiteLLM Proxy с хоста мог ходить в эту же БД
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
