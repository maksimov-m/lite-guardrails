services:
  guardrails:
    build: .
    image: lite-guardrails
    # Прямой доступ к FastAPI: API как обычно + Swagger на /docs, ReDoc на /redoc.
    # Бинд на 127.0.0.1 — снаружи машины порт закрыт (в интернет не торчит), но с
    # самого хоста и по SSH-туннелю доступен. Нужен доступ по сети — поменяйте на
    # "8000:8000"; для чисто прод-контура (только nginx) — уберите ports целиком,
    # оставив внутрисетевой expose ниже.
    ports:
      - "127.0.0.1:8000:8000"
    # Внутри docker-сети доступен как guardrails:8000 (nginx, Prometheus, пробы).
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # /live не трогает БД — годится как liveness контейнера (curl в образе нет,
      # берём стандартный urllib питона).
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/live')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Пусто -> UI ходит в API относительным путём через эту же nginx-проксю.
        VITE_API_BASE: ${UI_API_BASE:-}
    image: lite-guardrails-frontend
    # ЕДИНСТВЕННАЯ публичная точка входа. Порт хоста 8080 -> nginx :80.
    # Для prod поставьте перед ним TLS-терминатор или добавьте сюда 443 + сертификаты.
    ports:
      - "8080:80"
    depends_on:
      - guardrails
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Наружу не публикуется — только внутри docker-сети (guardrails:6379).
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB берутся из .env
    env_file:
      - .env
    # Порт БД биндим ТОЛЬКО на localhost хоста (127.0.0.1) — снаружи машины
    # недоступен, но локальный LiteLLM-прокси с хоста ещё может ходить в БД.
    # В проде эту секцию можно убрать целиком (тогда БД видна лишь в docker-сети).
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Мониторинг (опционально). Поднимается ТОЛЬКО с профилем monitoring:
  #       docker compose --profile monitoring up -d
  #     Без профиля эти два сервиса не стартуют — базовый запуск их не тянет.
  #     Кому Prometheus не нужен — просто скрейпят GET /metrics своим стеком.
  prometheus:
    image: prom/prometheus:v2.53.2
    profiles: ["monitoring"]
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    # UI/скрейп-таргет только на localhost хоста — наружу машины не торчит.
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - guardrails
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    profiles: ["monitoring"]
    environment:
      # Логин админа (для правки). Значения берутся из .env, дефолт — admin/admin.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # Анонимный просмотр (Viewer) — дашборд открывается без логина. Безопасно:
      # порт висит только на localhost. Редактировать можно лишь под админом.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: light
    volumes:
      # Автопровижининг: источник данных + дашборд подхватываются при старте.
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  promdata:
  grafanadata:
